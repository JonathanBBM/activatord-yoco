<script>
(function() {
    var VERCEL_FUNCTION_URL = 'https://activatord-yoco.vercel.app/api/create-checkout';
    var CANCEL_URL = 'https://www.activatord.store/fixmypool-checkout';
    var UPSELL_URL = 'https://www.activatord.store/upsell-6-pack';

    // Inject modal overlay styles
    var style = document.createElement('style');
    style.textContent = [
        '#yoco-modal-overlay {',
        '  display: none;',
        '  position: fixed;',
        '  top: 0; left: 0; right: 0; bottom: 0;',
        '  background: rgba(0,0,0,0.75);',
        '  z-index: 999999;',
        '  align-items: center;',
        '  justify-content: center;',
        '}',
        '#yoco-modal-overlay.active { display: flex; }',
        '#yoco-modal-box {',
        '  background: white;',
        '  border-radius: 12px;',
        '  width: 90%;',
        '  max-width: 480px;',
        '  height: 620px;',
        '  max-height: 90vh;',
        '  position: relative;',
        '  overflow: hidden;',
        '  box-shadow: 0 25px 50px rgba(0,0,0,0.3);',
        '}',
        '#yoco-modal-close {',
        '  position: absolute;',
        '  top: 10px; right: 14px;',
        '  font-size: 24px;',
        '  cursor: pointer;',
        '  color: #6b7280;',
        '  z-index: 10;',
        '  background: white;',
        '  border: none;',
        '  line-height: 1;',
        '  padding: 4px 8px;',
        '  border-radius: 4px;',
        '}',
        '#yoco-modal-close:hover { color: #111; }',
        '#yoco-iframe {',
        '  width: 100%;',
        '  height: 100%;',
        '  border: none;',
        '}'
    ].join('');
    document.head.appendChild(style);

    // Build modal HTML
    var overlay = document.createElement('div');
    overlay.id = 'yoco-modal-overlay';
    overlay.innerHTML = [
        '<div id="yoco-modal-box">',
        '  <button id="yoco-modal-close" title="Close">&times;</button>',
        '  <iframe id="yoco-iframe" allowpaymentrequest="true"></iframe>',
        '</div>'
    ].join('');
    document.body.appendChild(overlay);

    // Close button
    document.getElementById('yoco-modal-close').addEventListener('click', function() {
        closeModal();
    });

    // Close on overlay click
    overlay.addEventListener('click', function(e) {
        if (e.target === overlay) closeModal();
    });

    function openModal(url) {
        document.getElementById('yoco-iframe').src = url;
        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        overlay.classList.remove('active');
        document.getElementById('yoco-iframe').src = '';
        document.body.style.overflow = '';
    }

    // Listen for success message from success.html inside iframe
    window.addEventListener('message', function(event) {
        if (event.data && event.data.type === 'YOCO_PAYMENT_SUCCESS') {
            closeModal();
            var nativeBtn = document.getElementById('paymentbutton-34471d36');
            if (nativeBtn) {
                setTimeout(function() {
                    nativeBtn.click();
                    // Redirect to upsell after order is logged
                    setTimeout(function() {
                        window.location.href = UPSELL_URL;
                    }, 1000);
                }, 150);
            }
        }
    });

    // Wait for button to exist
    var runBridgeCheck = setInterval(function() {
        var customBtn = document.getElementById('inline-pay-btn');
        var nativeBtn = document.getElementById('paymentbutton-34471d36');

        if (customBtn && nativeBtn) {
            clearInterval(runBridgeCheck);

            customBtn.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();

                // Read fields at click time
                var firstVal  = (document.querySelector('input[name="first_name"]') || {}).value || '';
                var lastVal   = (document.querySelector('input[name="surname"]') || {}).value || '';
                var emailVal  = (document.querySelector('input[name="email"]') || {}).value || '';
                
                // Checkbox - try multiple selectors for mobile compatibility
                var checkbox = document.querySelector('input[type="checkbox"]');
                var isChecked = checkbox ? checkbox.checked : false;

                firstVal = firstVal.trim();
                lastVal  = lastVal.trim();
                emailVal = emailVal.trim();

                if (!firstVal) {
                    alert('Please enter your First Name to continue.');
                    return;
                }
                if (!lastVal) {
                    alert('Please enter your Surname to continue.');
                    return;
                }
                if (!emailVal) {
                    alert('Please enter your Email address to continue.');
                    return;
                }
                if (!isChecked) {
                    alert('Please accept the Terms and Conditions to continue.');
                    return;
                }

                // --- PRICE SCRAPER ---
                var totalAmountZAR = 0;
                var offerBox = document.getElementById('offerprice-ab6522e3');

                if (offerBox) {
                    var priceSpan = offerBox.querySelector('[data-testid="main-offer-price-physical-price"]');
                    if (priceSpan) {
                        var cleanNum = priceSpan.textContent.replace(/[^0-9.]/g, '');
                        if (cleanNum) totalAmountZAR = parseFloat(cleanNum);
                    }
                }

                if (!totalAmountZAR || isNaN(totalAmountZAR)) {
                    totalAmountZAR = 297.00;
                }

                var priceInCents = Math.round(totalAmountZAR * 100);

                // Loading state
                customBtn.disabled = true;
                customBtn.querySelector('span').textContent = 'Processing...';

                // Call Vercel function
                fetch(VERCEL_FUNCTION_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        amountInCents: priceInCents,
                        currency: 'ZAR',
                        cancelUrl: CANCEL_URL
                    })
                })
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    customBtn.disabled = false;
                    customBtn.querySelector('span').textContent = 'Complete Secure Checkout';

                    if (data.error) {
                        alert('Could not initiate payment: ' + data.error);
                        return;
                    }

                    // Open Yoco in iframe modal
                    openModal(data.redirectUrl);
                })
                .catch(function(err) {
                    console.error('Checkout error:', err);
                    alert('Something went wrong. Please try again.');
                    customBtn.disabled = false;
                    customBtn.querySelector('span').textContent = 'Complete Secure Checkout';
                });
            });
        }
    }, 200);

})();
</script>
