<script>
(function() {
    var VERCEL_FUNCTION_URL = 'https://activatord-yoco.vercel.app/api/create-checkout';
    var CANCEL_URL = 'https://www.activatord.store/fixmypool-checkout';

    var runBridgeCheck = setInterval(function() {
        var customBtn = document.getElementById('inline-pay-btn');
        var nativeBtn = document.getElementById('paymentbutton-34471d36');

        if (customBtn && nativeBtn) {
            clearInterval(runBridgeCheck);

            // Poll localStorage for payment success signal
            var pollForSuccess = setInterval(function() {
                if (localStorage.getItem('yoco_payment_success') === 'true') {
                    localStorage.removeItem('yoco_payment_success');
                    clearInterval(pollForSuccess);
                    setTimeout(function() {
                        nativeBtn.click();
                    }, 150);
                }
            }, 500);

            customBtn.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();

                var firstVal  = (document.querySelector('input[name="first_name"]') || {}).value || '';
                var lastVal   = (document.querySelector('input[name="surname"]') || {}).value || '';
                var emailVal  = (document.querySelector('input[name="email"]') || {}).value || '';
                var checkbox  = document.querySelector('input[data-dashlane-classification="consent,terms"]');
                var isChecked = checkbox ? checkbox.checked : false;

                firstVal  = firstVal.trim();
                lastVal   = lastVal.trim();
                emailVal  = emailVal.trim();

                if (!firstVal) {
                    alert('Please enter your First Name to continue.');
                    return;
                }
                if (!lastVal) {
                    alert('Please enter your Surname to continue.');
                    return;
                }
                if (!emailVal) {
                    alert('Please enter your Email address to continue.');
                    return;
                }
                if (!isChecked) {
                    alert('Please accept the Terms and Conditions to continue.');
                    return;
                }

                // --- PRICE SCRAPER ---
                var totalAmountZAR = 0;
                var offerBox = document.getElementById('offerprice-ab6522e3');

                if (offerBox) {
                    var priceSpan = offerBox.querySelector('[data-testid="main-offer-price-physical-price"]');
                    if (priceSpan) {
                        var cleanNum = priceSpan.textContent.replace(/[^0-9.]/g, '');
                        if (cleanNum) totalAmountZAR = parseFloat(cleanNum);
                    }
                }

                if (!totalAmountZAR || isNaN(totalAmountZAR)) {
                    totalAmountZAR = 297.00;
                }

                var priceInCents = Math.round(totalAmountZAR * 100);

                customBtn.disabled = true;
                customBtn.querySelector('span').textContent = 'Processing...';

                fetch(VERCEL_FUNCTION_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        amountInCents: priceInCents,
                        currency: 'ZAR',
                        cancelUrl: CANCEL_URL
                    })
                })
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    if (data.error) {
                        alert('Could not initiate payment: ' + data.error);
                        customBtn.disabled = false;
                        customBtn.querySelector('span').textContent = 'Complete Secure Checkout';
                        return;
                    }

                    var popup = window.open(
                        data.redirectUrl,
                        'YocoCheckout',
                        'width=520,height=680,left=' + ((screen.width - 520) / 2) + ',top=' + ((screen.height - 680) / 2)
                    );

                    customBtn.disabled = false;
                    customBtn.querySelector('span').textContent = 'Complete Secure Checkout';

                    if (!popup || popup.closed || typeof popup.closed === 'undefined') {
                        window.location.href = data.redirectUrl;
                    }
                })
                .catch(function(err) {
                    console.error('Checkout error:', err);
                    alert('Something went wrong. Please try again.');
                    customBtn.disabled = false;
                    customBtn.querySelector('span').textContent = 'Complete Secure Checkout';
                });
            });
        }
    }, 200);
})();
</script>
